<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFocus To-Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ZenFocus</h1>
            <p class="subtitle">Organize your thoughts, master your day.</p>
        </header>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-labels">
                <span>Task Progress</span>
                <span class="js-progress-text">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill js-progress-bar"></div>
            </div>
        </div>

        <div class="input-card">
            <input type="text" placeholder="What's the next task?" class="js-input">
            <input type="date" class="js-date-input">
            <button onclick="addTodo()" class="add-button">Add Task</button>
        </div>

        <p class="error-msg js-error">Please enter a task name!</p>

        <div class="list-header">
            <h3>Your Tasks</h3>
            <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
        </div>
        
        <!-- Active tasks -->
        <div class="js-todo-list todo-list-wrapper"></div>

        <!-- ARCHIVE SECTION (NEW) -->
        <div class="archive-section js-archive-section" style="display: none;">
            <div class="archive-header" onclick="toggleArchive()">
                <span class="archive-title">📦 Completed Archive (<span class="js-archive-count">0</span>)</span>
                <span class="archive-toggle js-archive-toggle">▼</span>
            </div>
            <div class="js-archive-list archive-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
